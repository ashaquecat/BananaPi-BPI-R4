name: delete-older-releases
on:
  workflow_dispatch:
  schedule:
    - cron: 0 16 * * *
    
jobs:
  del_runs:
    runs-on: ubuntu-latest
    steps:

    - name: 删除工作流
      uses: MedyMa/delete-workflow-runs@main
      with:
        retain_days: 7
        keep_minimum_runs: 0
    
    - name: 删除旧的Releases
      uses: MedyMa/delete-older-releases@v0.3.4

      with:
        keep_latest: 30
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
